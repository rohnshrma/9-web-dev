<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App Starter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="weather-card">
        <div class="card-header">
          <p class="eyebrow">Weather App</p>
          <h1>Mausam</h1>
          <p class="subtext">
            A clean HTML and CSS base for your city weather search UI.
          </p>
        </div>

        <form class="search-form" action="#" method="get">
          <label class="sr-only" for="city">Enter city</label>
          <input
            type="text"
            id="city"
            name="city"
            placeholder="Enter city name"
            autocomplete="off"
          />
          <button type="submit">Search</button>
        </form>

        <section class="result-panel" aria-label="Weather result">
          <div class="result-top">
            <p class="result-label">Current Weather</p>
            <h2>New York</h2>
          </div>

          <div class="temperature-block">
            <span class="temp-value">24&deg;C</span>
            <span class="temp-description">Partly Cloudy</span>
          </div>

          <div class="weather-details">
            <article class="detail-box">
              <span class="detail-title">Feels Like</span>
              <strong>26&deg;C</strong>
            </article>
            <article class="detail-box">
              <span class="detail-title">Description</span>
              <strong>Light breeze and soft clouds</strong>
            </article>
            <article class="detail-box">
              <span class="detail-title">City</span>
              <strong>New York</strong>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
