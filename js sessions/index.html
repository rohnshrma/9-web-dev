<!-- Declares HTML5 document type so browser uses modern rendering mode -->
<!DOCTYPE html>
<!-- Root HTML element; `lang="en"` helps accessibility tools and search engines -->
<html lang="en">
  <head>
    <!-- Head contains metadata (not visible page content) -->

    <!-- Sets character encoding to UTF-8 so most text/symbols render correctly -->
    <meta charset="UTF-8" />

    <!-- Makes layout responsive on mobile devices by matching viewport width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Text shown in browser tab -->
    <title>Document</title>
  </head>
  <body>
    <!-- Loads and executes JavaScript file `loops.js` -->
    <!-- Script is placed at end of body so HTML is parsed before script runs -->
    <script src="loops.js"></script>
  </body>
</html>
